<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BGMプレーヤー</title>
  <style>
    body {
      font-family: sans-serif;
      text-align: center;
      background-color: #f8f8f8;
      padding: 20px;
    }
    h3 {
      margin-bottom: 15px;
    }
    .purple-border-bgm {
      border: 2px solid purple;
      padding: 10px;
      margin: 10px auto;
      width: 80%;
      max-width: 400px;
      background-color: #eee;
      border-radius: 5px;
    }
    .blue-bold {
      color: blue;
      font-weight: bold;
      margin-bottom: 10px;
    }
    .button-container {
      margin-top: 10px;
    }
    button {
      margin: 5px;
      padding: 8px 16px;
      font-size: 16px;
    }
    #trackTitle {
      font-weight: bold;
      font-size: 18px;
      color: darkgreen;
      margin-top: 10px;
    }
    input[type="range"] {
      width: 80%;
      max-width: 400px;
    }
    .time-display {
      font-size: 14px;
      color: #333;
      margin-top: 5px;
    }
    .volume-control {
      margin-top: 15px;
    }
  </style>
</head>
<body>
  <h3>BGMプレーヤー</h3>

  <div class="purple-border-bgm">
    <p class="blue-bold">BGMを再生して奄美を感じよう！</p>
    <p id="trackTitle">曲タイトル: 未再生</p>
    <div>
      <label for="progressBar" style="position:absolute;left:-10000px;top:auto;width:1px;height:1px;overflow:hidden;">再生位置</label>
      <input type="range" id="progressBar" value="0" min="0" max="100" title="再生位置">
      <div class="time-display">
        <span id="currentTime">0:00</span> / <span id="totalTime">0:00</span>
      </div>
    </div>

    <audio id="audioPlayer"></audio>

    <div class="button-container">
      <button id="playButton">再生</button>
      <button id="stopButton">停止</button>
      <button id="prevTrackButton">前の曲へ</button>
      <button id="nextTrackButton">次の曲へ</button>
      <button id="bgm-close-button">閉じる</button>
    </div>
  </div>

  <div class="volume-control">
    <label for="volumeSlider">音量:</label>
    <input type="range" id="volumeSlider" min="0" max="1" step="0.01" value="0.5">
  </div>

  <script>
    const audioPlayer = document.getElementById("audioPlayer");
    const playButton = document.getElementById("playButton");
    const stopButton = document.getElementById("stopButton");
    const nextTrackButton = document.getElementById("nextTrackButton");
    const prevTrackButton = document.getElementById("prevTrackButton"); // 追加
    const bgmCloseButton = document.getElementById("bgm-close-button");
    const trackTitle = document.getElementById("trackTitle");
    const progressBar = document.getElementById("progressBar");
    const currentTimeDisplay = document.getElementById("currentTime");
    const totalTimeDisplay = document.getElementById("totalTime");
    const volumeSlider = document.getElementById("volumeSlider");

    const playlist = [       
      { file: "hp-music/furusato_kitahara.aac", title: "ふるさとの話をしよう" },
      { file: "hp-music/amamiwoomouuta_sasori.aac", title: "奄美を想うsasori" },
      { file: "hp-music/shima_blues.aac", title: "島のブルース" },
      { file: "hp-music/furusatohekaeritai_sasori.aac", title: "ふるさとへ帰りたいsasori" },
      { file: "hp-music/yoronbojo.aac", title: "与論慕情" },
      { file: "hp-music/kakeromabojo.aac", title: "加計呂麻慕情" },
      { file: "hp-music/furusatoamamiyo-towani_sasori.aac", title: "ふるさと奄美よ永遠にsasori" },
      { file: "hp-music/shima_sodachi.aac", title: "島育ち" },
       { file: "hp-music/kazenomamani-yoronjimae.mp3", title: "風のままに与論島へsasori" }, 
      { file: "hp-music/tokunoshima_kouta.aac", title: "徳之島小唄" },
      { file: "hp-music/yumenomukoni-okinoerabu.mp3", title: "夢の向こうに沖永良部島sasori" },
      { file: "hp-music/funaki_koukou_sannensei.aac", title: "高校三年生" },
      { file: "hp-music/furusatoyo-hanareteitemo.mp3", title: "ふるさとよ離れていても" },
       { file: "hp-music/waidowaidono-tokunosima.mp3", title: "ワイドワイドの徳之島へsasori" },   
　　　 { file: "hp-music/sinkawa_furusato.aac", title: "ふるさとへ" },
      { file: "hp-music/kakeromahe-sasori.mp3", title: "加計呂麻へsasori" },
      { file: "hp-music/wagamichi.mp3", title: "我が道" },  
      { file: "hp-music/amamioosima-yumetomori-sasori.mp3", title: "奄美本島夢灯りsasori" },
      { file: "hp-music/imamo-omaenoegaoo-sasori.mp3", title: "今もお前の笑顔をsasori" },
      { file: "hp-music/itukakaero-kikaijima-sasori.mp3", title: "いつか帰ろう喜界島sasori" },
      { file: "hp-music/omokage.mp3", title: "面影（おもかげ）sasori" }, 
      { file: "hp-music/itumonomisede-hitorigurasukatamukete.mp3", title: "いつもの店で一人グラス傾けてsasori" },
      { file: "hp-music/manabiyanoomoi-imamo-sasori.mp3", title: "学び舎の想い今もsasori" },
      { file: "hp-music/hosifuru-yoruha-sasori.mp3", title: "星降る夜はsasori" },
      { file: "hp-music/maewomuite-sasori.mp3", title: "前を向いてsasori" },
      { file: "hp-music/dosokainoomoi-sasori.mp3", title: "同窓会の思いsasori" },
      { file: "hp-music/wagafurusato-tokunoshima-sasori.mp3", title: "わがふるさと徳之島sasori" }

    ];
    let currentTrack = 0;
    let isPlaying = false;
    let pausedTime = 0;

    function formatTime(seconds) {
      const minutes = Math.floor(seconds / 60);
      const remainingSeconds = Math.floor(seconds % 60).toString().padStart(2, '0');
      return `${minutes}:${remainingSeconds}`;
    }

    function playTrack(trackIndex) {
      audioPlayer.src = playlist[trackIndex].file;
      audioPlayer.currentTime = pausedTime;
      pausedTime = 0;
      audioPlayer.play().then(() => {
        isPlaying = true;
        playButton.textContent = "一時停止";
        trackTitle.textContent = "曲タイトル: " + playlist[trackIndex].title;
      }).catch(error => {
        console.error("再生エラー:", error);
      });
    }

    playButton.addEventListener("click", () => {
      if (isPlaying) {
        audioPlayer.pause();
        isPlaying = false;
        pausedTime = audioPlayer.currentTime;
        playButton.textContent = "再生";
      } else {
        playTrack(currentTrack);
      }
    });

    stopButton.addEventListener("click", () => {
      audioPlayer.pause();
      audioPlayer.currentTime = 0;
      pausedTime = 0;
      isPlaying = false;
      playButton.textContent = "再生";
      progressBar.value = 0;
      currentTimeDisplay.textContent = "0:00";
    });

    nextTrackButton.addEventListener("click", () => {
      currentTrack = (currentTrack + 1) % playlist.length;
      playTrack(currentTrack);
    });

    prevTrackButton.addEventListener("click", () => {
      currentTrack = (currentTrack - 1 + playlist.length) % playlist.length;
      playTrack(currentTrack);
    });

    audioPlayer.addEventListener("ended", () => {
      pausedTime = 0;
      currentTrack = (currentTrack + 1) % playlist.length;
      playTrack(currentTrack);
    });

    audioPlayer.addEventListener("timeupdate", () => {
      progressBar.value = audioPlayer.currentTime;
      currentTimeDisplay.textContent = formatTime(audioPlayer.currentTime);
    });

    audioPlayer.addEventListener("loadedmetadata", () => {
      progressBar.max = audioPlayer.duration;
      totalTimeDisplay.textContent = formatTime(audioPlayer.duration);
    });

    progressBar.addEventListener("input", () => {
      audioPlayer.currentTime = progressBar.value;
    });

    bgmCloseButton.addEventListener("click", () => {
      window.close();
    });

    volumeSlider.addEventListener("input", function () {
      audioPlayer.volume = this.value;
    });
  </script>
</body>
</html>

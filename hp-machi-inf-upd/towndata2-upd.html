<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <title>市町村観光誘致情報 更新登録フォーム</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            font-weight: bold;
            margin-bottom: 5px;
        }

        select,
        input,
        textarea {
            width: 100%;
            padding: 8px;
            box-sizing: border-box;
        }

        .submit-btn {
            padding: 10px 20px;
            font-size: 16px;
        }

        .loading-message {
            text-align: center;
            font-size: 18px;
            color: #888;
            margin-top: 20px;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>市町村観光誘致情報 更新登録フォーム</h1>
        <!-- <form action="submit.php" method="post" enctype="multipart/form-data" onsubmit="submitForm(event)"> -->
            <form id="myForm" action="submit.php" method="post" enctype="multipart/form-data"></form>
            <div class="form-group">
                <label for="key_code">KEY (市町村コード＋ジャンルコード):</label>
                <select name="key_code" id="key_code" required>
                    <option value="">データ取得中...</option>
                </select>
            </div>

            <div class="form-group">
                <label for="sub_category">小分類コード (3桁):</label>
                <input type="text" name="sub_category" id="sub_category" maxlength="3" pattern="\d{3}" required>
            </div>

            <div class="form-group">
                <label for="name">名称:</label>
                <input type="text" name="name" id="name" required>
            </div>

            <div class="form-group">
                <label for="description">概要:</label>
                <textarea name="description" id="description" rows="4" required></textarea>
            </div>

            <div class="form-group">
                <label for="image">画像:</label>
                <input type="file" name="image" id="image" accept="image/*" required>
            </div>

            <div class="form-group">
                <label for="url">URL:</label>
                <input type="url" name="url" id="url" required>
            </div>

            <div class="form-group">
                <label for="postal_code">郵便番号:</label>
                <input type="text" name="postal_code" id="postal_code" pattern="\d{3}-?\d{4}" required>
            </div>

            <div class="form-group">
                <label for="address">住所:</label>
                <input type="text" name="address" id="address" required>
            </div>

            <div class="form-group">
                <label for="phone">連絡先電話番号:</label>
                <input type="tel" name="phone" id="phone" pattern="[\d\-]+" required>
            </div>

            <div class="form-group">
                <label for="contact_person">担当者名:</label>
                <input type="text" name="contact_person" id="contact_person" required>
            </div>

            <div class="form-group">
                <input type="submit" class="submit-btn" value="送信">
            </div>
        </form>
    </div>

    <script>

       async function submitForm(event) {
    event.preventDefault();  // フォームのデフォルト送信を止める

    const form = event.target;
    const formData = new FormData(form);

    try {
        const response = await fetch("submit.php", {
            method: "POST",
            body: formData,
        });

        if (!response.ok) {
            const errorText = await response.text();
            throw new Error(`HTTP error! status: ${response.status}, message: ${errorText || 'Unknown error'}`);
        }

        const data = await response.json();
        alert(data.message);
        form.reset();

    } catch (error) {
        console.error("Error:", error);
        alert("データの送信に失敗しました: " + error.message);
    }
}

        function showLoadingMessage(message = 'データ取得中...') {
            const loadingDiv = document.createElement('div');
            loadingDiv.className = 'loading-message';
            loadingDiv.textContent = message;
            document.querySelector('.container').appendChild(loadingDiv);
        }

        function hideLoadingMessage() {
            const loadingDiv = document.querySelector('.loading-message');
            if (loadingDiv) {
                loadingDiv.remove();
            }
        }

        async function submitForm(event) {
            event.preventDefault();
            const form = event.target;
            const formData = new FormData(form);

            try {
                const response = await fetch("submit.php", {
                    method: "POST",
                    body: formData,
                });

                if (!response.ok) {
                    const errorText = await response.text();
                    throw new Error(`HTTP error! status: ${response.status}, message: ${errorText || 'Unknown error'}`);
                }

                const data = await response.json();
                alert(data.message);
                form.reset();
            } catch (error) {
                console.error("Error:", error);
                alert("データの送信に失敗しました: " + error.message);
            }
        }

        window.onload = () => {
            showLoadingMessage();
            extractTableData();
        };
    </script>
</body>

</html>

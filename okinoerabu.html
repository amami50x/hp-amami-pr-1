<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>沖永良部島 — 花と鍾乳洞の楽園</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,600;1,300;1,600&family=Noto+Serif+JP:wght@200;300;700&family=Trajan+Pro&family=Josefin+Sans:wght@100;300;400&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
width: 800px;
height: 1130px;
overflow: hidden;
background: #020d1a;
}

.poster {
width: 800px;
height: 1130px;
position: relative;
overflow: hidden;
background: #020d1a;
}

/* ===================== BACKGROUND BASE ===================== */
.bg-gradient {
position: absolute;
inset: 0;
background: linear-gradient(
175deg,
#010810 0%,
#041628 8%,
#062540 14%,
#083860 20%,
#0a5278 26%,
#0c7090 30%,
#0e8fa0 34%,
#10aeb0 38%,
#06c4b8 42%,
#04d4b0 46%,
#02c8a0 50%,
#04b08a 54%,
#068870 59%,
#0a6050 64%,
#0c4838 70%,
#0a3028 76%,
#071c18 82%,
#041008 90%,
#020808 100%
);
}

/* ===================== STARS ===================== */
.stars {
position: absolute;
top: 0; left: 0; right: 0;
height: 28%;
overflow: hidden;
}
.star {
position: absolute;
border-radius: 50%;
background: white;
animation: twinkle ease-in-out infinite;
}
@keyframes twinkle {
0%,100% { opacity: 0.2; transform: scale(1); }
50% { opacity: 1; transform: scale(1.4); }
}

/* ===================== MOON ===================== */
.moon-wrap {
position: absolute;
top: 36px;
right: 110px;
}
.moon {
width: 72px;
height: 72px;
border-radius: 50%;
background: radial-gradient(circle at 38% 42%, #fffbe0 0%, #ffe88a 35%, #ffcc44 60%, #e0a020 85%, #c08010 100%);
box-shadow:
0 0 20px 8px rgba(255,220,80,0.35),
0 0 50px 20px rgba(255,200,60,0.18),
0 0 100px 40px rgba(255,180,40,0.08);
animation: moonpulse 5s ease-in-out infinite;
}
@keyframes moonpulse {
0%,100% { box-shadow: 0 0 20px 8px rgba(255,220,80,0.35), 0 0 50px 20px rgba(255,200,60,0.18), 0 0 100px 40px rgba(255,180,40,0.08); }
50% { box-shadow: 0 0 28px 12px rgba(255,220,80,0.5), 0 0 70px 30px rgba(255,200,60,0.25), 0 0 130px 50px rgba(255,180,40,0.12); }
}
/* Moon craters */
.moon::after {
content: ‘’;
position: absolute;
top: 18px; left: 22px;
width: 14px; height: 10px;
border-radius: 50%;
background: rgba(180,130,20,0.3);
box-shadow: 20px 20px 0 8px rgba(160,110,10,0.2), -6px 28px 0 5px rgba(180,130,20,0.15);
}
.moon-halo {
position: absolute;
top: 50%; left: 50%;
transform: translate(-50%,-50%);
width: 120px; height: 120px;
border-radius: 50%;
border: 1px solid rgba(255,210,80,0.2);
box-shadow: inset 0 0 20px rgba(255,200,60,0.05);
}

/* ===================== MILKY WAY / NEBULA ===================== */
.nebula {
position: absolute;
top: 0; left: 0; right: 0;
height: 42%;
background:
radial-gradient(ellipse 60% 30% at 30% 50%, rgba(80,120,200,0.08) 0%, transparent 70%),
radial-gradient(ellipse 80% 20% at 70% 60%, rgba(120,80,180,0.06) 0%, transparent 70%);
pointer-events: none;
}

/* ===================== OCEAN ===================== */
.ocean {
position: absolute;
top: 33%;
left: 0; right: 0;
height: 22%;
}
.ocean-layer {
position: absolute;
inset: 0;
background: linear-gradient(180deg,
rgba(15,180,200,0.9) 0%,
rgba(10,160,175,0.95) 25%,
rgba(6,140,155,1) 50%,
rgba(4,110,125,1) 75%,
rgba(2,80,95,1) 100%
);
}

/* Bioluminescent glow on water */
.bio-glow {
position: absolute;
bottom: 0;
left: -10%;
width: 120%;
height: 40%;
background: radial-gradient(ellipse 70% 100% at 50% 100%, rgba(0,255,200,0.15) 0%, transparent 70%);
animation: bio 4s ease-in-out infinite;
}
@keyframes bio {
0%,100% { opacity: 0.6; }
50% { opacity: 1; }
}

/* Moonlight reflection */
.moon-reflect {
position: absolute;
top: 0;
left: 50%;
transform: translateX(-50%);
width: 120px;
height: 100%;
background: linear-gradient(180deg, rgba(255,220,100,0.25) 0%, rgba(255,200,80,0.08) 60%, transparent 100%);
filter: blur(8px);
animation: reflect 3s ease-in-out infinite;
}
@keyframes reflect {
0%,100% { width: 100px; opacity: 0.8; }
50% { width: 140px; opacity: 1; }
}

/* Water sparkles */
.water-sparkle {
position: absolute;
width: 3px; height: 1px;
background: rgba(255,255,255,0.8);
border-radius: 50%;
animation: sparkle ease-in-out infinite;
}
@keyframes sparkle {
0%,100% { opacity: 0; transform: scaleX(1); }
50% { opacity: 1; transform: scaleX(3); }
}

/* ===================== CORAL UNDERWATER HINT ===================== */
.underwater {
position: absolute;
bottom: 0;
left: 0; right: 0;
height: 35%;
overflow: hidden;
}

/* ===================== BEACH ===================== */
.beach {
position: absolute;
top: 54%;
left: 0; right: 0;
height: 7%;
}
.beach-sand {
position: absolute;
inset: 0;
background: linear-gradient(180deg,
#f0d88a 0%,
#e0c070 30%,
#caa050 60%,
#b88038 100%
);
border-radius: 55% 55% 0 0 / 25% 25% 0 0;
}
.beach-wet {
position: absolute;
top: 0; left: 5%; right: 5%;
height: 30%;
background: rgba(100,200,180,0.3);
border-radius: 50%;
filter: blur(6px);
}

/* ===================== CLIFF / ROCK FORMATION ===================== */
.cliffs {
position: absolute;
top: 52%;
left: 0; right: 0;
height: 15%;
pointer-events: none;
}

/* ===================== FOREST ===================== */
.forest-bg {
position: absolute;
top: 60%;
left: 0; right: 0;
bottom: 0;
background: linear-gradient(180deg,
#094228 0%,
#062e1c 25%,
#041c10 55%,
#020e08 80%,
#010804 100%
);
}

/* ===================== LILY FLOWERS ===================== */
.lilies {
position: absolute;
bottom: 18%;
left: 0; right: 0;
height: 20%;
pointer-events: none;
}

/* ===================== STALACTITE CAVE SILHOUETTE ===================== */
.cave {
position: absolute;
bottom: 0;
left: 50%;
transform: translateX(-50%);
width: 340px;
height: 200px;
pointer-events: none;
}

/* ===================== PALM & TROPICAL TREES ===================== */
.vegetation { position: absolute; top: 52%; left: 0; right: 0; bottom: 0; }

/* ===================== FRAME ===================== */
.ornate-frame {
position: absolute;
inset: 0;
pointer-events: none;
}
.frame-top, .frame-bottom {
position: absolute;
left: 0; right: 0;
height: 6px;
}
.frame-top { top: 0; background: linear-gradient(90deg, transparent, rgba(0,200,160,0.8), rgba(255,215,80,0.6), rgba(0,200,160,0.8), transparent); }
.frame-bottom { bottom: 0; background: linear-gradient(90deg, transparent, rgba(0,200,160,0.8), rgba(255,215,80,0.6), rgba(0,200,160,0.8), transparent); }
.frame-left, .frame-right {
position: absolute;
top: 0; bottom: 0;
width: 6px;
}
.frame-left { left: 0; background: linear-gradient(180deg, transparent, rgba(0,200,160,0.8), rgba(255,215,80,0.6), rgba(0,200,160,0.8), transparent); }
.frame-right { right: 0; background: linear-gradient(180deg, transparent, rgba(0,200,160,0.8), rgba(255,215,80,0.6), rgba(0,200,160,0.8), transparent); }

/* ===================== TEXT ===================== */
.text-layer {
position: absolute;
inset: 0;
pointer-events: none;
display: flex;
flex-direction: column;
align-items: center;
}

.header-badge {
margin-top: 28px;
padding: 6px 24px;
border: 1px solid rgba(0,210,170,0.5);
border-radius: 30px;
background: rgba(0,30,20,0.4);
backdrop-filter: blur(4px);
font-family: ‘Josefin Sans’, sans-serif;
font-size: 9.5px;
font-weight: 300;
letter-spacing: 7px;
color: rgba(140,255,220,0.9);
text-shadow: 0 0 12px rgba(0,220,180,0.7);
}

.main-jp {
margin-top: 175px;
font-family: ‘Noto Serif JP’, serif;
font-size: 78px;
font-weight: 200;
color: transparent;
background: linear-gradient(180deg, #ffffff 0%, #b8ffe8 40%, #60ffcc 70%, #00e8b0 100%);
-webkit-background-clip: text;
background-clip: text;
letter-spacing: 6px;
line-height: 1;
text-shadow: none;
filter: drop-shadow(0 0 30px rgba(0,230,180,0.7)) drop-shadow(0 0 60px rgba(0,200,160,0.4));
animation: title-glow 5s ease-in-out infinite;
}
@keyframes title-glow {
0%,100% { filter: drop-shadow(0 0 20px rgba(0,230,180,0.6)) drop-shadow(0 0 50px rgba(0,200,160,0.3)); }
50% { filter: drop-shadow(0 0 35px rgba(0,255,200,0.9)) drop-shadow(0 0 80px rgba(0,220,180,0.5)); }
}

.romaji {
margin-top: 10px;
font-family: ‘Cormorant Garamond’, serif;
font-weight: 300;
font-size: 18px;
letter-spacing: 14px;
color: rgba(200,255,240,0.85);
text-shadow: 0 0 15px rgba(0,200,160,0.6);
}

.elegant-divider {
margin-top: 16px;
position: relative;
width: 400px;
height: 20px;
display: flex;
align-items: center;
justify-content: center;
gap: 10px;
}
.ediv-line { flex: 1; height: 1px; background: linear-gradient(90deg, transparent, rgba(0,200,160,0.7), transparent); }
.ediv-center {
width: 16px; height: 16px;
position: relative;
flex-shrink: 0;
}
.ediv-center::before, .ediv-center::after {
content: ‘’;
position: absolute;
top: 50%; left: 50%;
transform: translate(-50%,-50%) rotate(45deg);
border: 1px solid rgba(0,220,170,0.7);
}
.ediv-center::before { width: 10px; height: 10px; }
.ediv-center::after { width: 6px; height: 6px; background: rgba(0,220,170,0.5); }

.sub-jp {
margin-top: 8px;
font-family: ‘Noto Serif JP’, serif;
font-size: 14px;
font-weight: 200;
color: rgba(180,255,230,0.8);
letter-spacing: 6px;
text-shadow: 0 0 12px rgba(0,200,160,0.5);
}

.feature-row {
margin-top: 14px;
display: flex;
gap: 10px;
}
.feat {
font-family: ‘Josefin Sans’, sans-serif;
font-size: 8px;
font-weight: 100;
letter-spacing: 3px;
color: rgba(160,255,220,0.75);
border: 1px solid rgba(0,200,160,0.3);
padding: 4px 14px;
background: rgba(0,40,30,0.3);
border-radius: 2px;
}

.mid-spacer { flex: 1; }

.bottom-wrap {
width: 100%;
padding: 0 50px 30px;
background: linear-gradient(180deg, transparent 0%, rgba(1,8,5,0.95) 35%, rgba(1,5,3,0.99) 100%);
}

.bottom-divider-line {
width: 100%;
height: 1px;
background: linear-gradient(90deg, transparent, rgba(0,180,140,0.6), rgba(255,200,80,0.4), rgba(0,180,140,0.6), transparent);
margin-bottom: 18px;
}

.tagline-en {
font-family: ‘Cormorant Garamond’, serif;
font-style: italic;
font-size: 24px;
font-weight: 300;
color: rgba(160,255,220,0.9);
text-align: center;
letter-spacing: 2px;
text-shadow: 0 0 20px rgba(0,200,160,0.5);
display: block;
margin-bottom: 8px;
}

.tagline-sub {
font-family: ‘Noto Serif JP’, serif;
font-size: 12px;
font-weight: 200;
color: rgba(120,220,180,0.7);
letter-spacing: 5px;
text-align: center;
display: block;
margin-bottom: 16px;
}

.icon-row {
display: flex;
justify-content: center;
gap: 36px;
margin-bottom: 10px;
}
.icon-item {
display: flex;
flex-direction: column;
align-items: center;
gap: 5px;
}
.icon-sym { font-size: 20px; filter: drop-shadow(0 0 6px rgba(0,200,160,0.7)); }
.icon-lbl {
font-family: ‘Josefin Sans’, sans-serif;
font-size: 7.5px;
font-weight: 100;
letter-spacing: 2.5px;
color: rgba(100,200,160,0.7);
text-align: center;
}

.bottom-border-glow {
width: 100%;
height: 4px;
background: linear-gradient(90deg, #003828, #00c890, #00ffcc, #00c890, #003828);
border-radius: 2px;
box-shadow: 0 0 12px rgba(0,200,160,0.6);
margin-top: 8px;
}
</style>

</head>
<body>
<div class="poster">

<!-- BASE GRADIENT -->

<div class="bg-gradient"></div>

<!-- NEBULA -->

<div class="nebula"></div>

<!-- STARS -->

<div class="stars" id="stars"></div>

<!-- MOON -->

<div class="moon-wrap">
<div class="moon-halo"></div>
<div class="moon"></div>
</div>

<!-- OCEAN -->

<div class="ocean">
<div class="ocean-layer"></div>
<div class="bio-glow"></div>
<div class="moon-reflect"></div>
<!-- water sparkles -->
<div class="water-sparkle" style="top:30%;left:15%;animation-duration:1.8s;animation-delay:0s;"></div>
<div class="water-sparkle" style="top:45%;left:28%;animation-duration:2.2s;animation-delay:0.4s;"></div>
<div class="water-sparkle" style="top:25%;left:42%;animation-duration:1.5s;animation-delay:0.8s;"></div>
<div class="water-sparkle" style="top:55%;left:58%;animation-duration:2s;animation-delay:1.2s;"></div>
<div class="water-sparkle" style="top:35%;left:70%;animation-duration:1.7s;animation-delay:0.6s;"></div>
<div class="water-sparkle" style="top:20%;left:82%;animation-duration:2.4s;animation-delay:1s;"></div>
<div class="water-sparkle" style="top:60%;left:90%;animation-duration:1.9s;animation-delay:1.5s;"></div>
</div>

<!-- BEACH -->

<div class="beach">
<div class="beach-sand"></div>
<div class="beach-wet"></div>
</div>

<!-- FOREST BACKGROUND -->

<div class="forest-bg"></div>

<!-- VEGETATION / PALM TREES via SVG -->

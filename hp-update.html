
<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>観光情報入力</title>
    <style>
        table { width: 100%; border-collapse: collapse; }
        th, td { border: 1px solid #ccc; padding: 8px; text-align: left; }
        button { margin-top: 10px; }
    </style>
</head>
<body>

<h2>観光情報入力フォーム</h2>
<table id="tourismTable">
    <thead>
        <tr>
            <th>市町村名</th>
            <th>場所名</th>
            <th>説明</th>
            <th>連絡先</th>
            <th>住所</th>
            <th>画像</th>
            <th>操作</th>
        </tr>
    </thead>
    <tbody>
        <tr>
            <td><input type="text" name="city"></td>
            <td><input type="text" name="place"></td>
            <td><input type="text" name="description"></td>
            <td><input type="text" name="contact"></td>
            <td><input type="text" name="address"></td>
            <td><input type="file" name="image"></td>
            <td><button onclick="deleteRow(this)">削除</button></td>
        </tr>
    </tbody>
</table>

<button onclick="addRow()">＋行を追加</button>

<script>
function addRow() {
    let table = document.getElementById("tourismTable").getElementsByTagName('tbody')[0];
    let newRow = table.insertRow();
    let cells = ["city", "place", "description", "contact", "address", "image"];
    
    cells.forEach(name => {
        let cell = newRow.insertCell();
        if (name === "image") {
            cell.innerHTML = '<input type="file" name="' + name + '">';
        } else {
            cell.innerHTML = '<input type="text" name="' + name + '">';
        }
    });

    let deleteCell = newRow.insertCell();
    deleteCell.innerHTML = '<button onclick="deleteRow(this)">削除</button>';
}

function deleteRow(btn) {
    let row = btn.parentNode.parentNode;
    row.parentNode.removeChild(row);
}
</script>

</body>
</html>


<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>BGMプレーヤー</title>
  <style>
    body {
      font-family: "Segoe UI", "Yu Gothic UI", Meiryo, sans-serif;
      text-align: center;
      margin: 0;
      min-height: 100vh;
      padding: 18px 14px 24px;
      box-sizing: border-box;
      background: linear-gradient(165deg, #e8f2ff 0%, #f3e9f8 40%, #fff8f0 100%);
    }
    h3 {
      margin: 0 0 14px;
      color: #3d2d50;
      font-weight: 700;
    }
    .purple-border-bgm {
      border: 2px solid #7b4bbd;
      padding: 14px 12px;
      margin: 10px auto;
      width: 92%;
      max-width: 460px;
      background: rgba(255, 255, 255, 0.92);
      border-radius: 12px;
      box-shadow: 0 6px 22px rgba(70, 50, 110, 0.12);
    }
    .blue-bold {
      color: blue;
      font-weight: bold;
      margin-bottom: 10px;
    }
    .button-container {
      margin-top: 10px;
    }
    button {
      margin: 5px;
      padding: 8px 16px;
      font-size: 16px;
    }
    #trackTitle {
      font-weight: bold;
      font-size: 18px;
      color: darkgreen;
      margin-top: 10px;
    }
    input[type="range"] {
      width: 80%;
      max-width: 400px;
    }
    .time-display {
      font-size: 14px;
      color: #333;
      margin-top: 5px;
    }
    .volume-control {
      margin-top: 18px;
      padding: 10px 14px;
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.75);
      border: 1px solid rgba(123, 75, 189, 0.2);
      display: inline-block;
      min-width: min(92vw, 280px);
    }
  </style>
</head>
<body>
  <h3>BGMプレーヤー</h3>

  <div class="purple-border-bgm">
    <p class="blue-bold">BGMを再生して奄美を感じよう！</p>
    <p id="trackTitle">曲タイトル: 未再生</p>
    <div>
      <input type="range" id="progressBar" value="0" min="0" max="100">
      <div class="time-display">
        <span id="currentTime">0:00</span> / <span id="totalTime">0:00</span>
      </div>
    </div>

    <audio id="audioPlayer"></audio>

    <div class="button-container">
      <button id="playButton">再生</button>
      <button id="stopButton">停止</button>
      <button id="nextTrackButton">次の曲へ</button>
      <button id="bgm-close-button">閉じる</button>
    </div>
  </div>

  <!-- 追加: 音量調整スライダー -->
  <div class="volume-control">
    <label for="volumeSlider">音量:</label>
    <input type="range" id="volumeSlider" min="0" max="1" step="0.01" value="0.5">
  </div>

  <script>
    const bgmMainChannel = new BroadcastChannel("bgm-amami-slideshow");

    function notifyMainSlideshow(hidden) {
      bgmMainChannel.postMessage({ hideSlideshow: hidden });
    }

    window.addEventListener("pagehide", function () {
      notifyMainSlideshow(false);
    });

    // DOM要素の取得（重複宣言を防いで1つのスクリプトに統合）
    const audioPlayer = document.getElementById("audioPlayer");
    const playButton = document.getElementById("playButton");
    const stopButton = document.getElementById("stopButton");
    const nextTrackButton = document.getElementById("nextTrackButton");
    const bgmCloseButton = document.getElementById("bgm-close-button");
    const trackTitle = document.getElementById("trackTitle");
    const progressBar = document.getElementById("progressBar");
    const currentTimeDisplay = document.getElementById("currentTime");
    const totalTimeDisplay = document.getElementById("totalTime");
    const volumeSlider = document.getElementById("volumeSlider");

    // プレイリストの設定
    const playlist = [
      { file: "hp-music/furusato_kitahara.aac", title: "ふるさとの話をしよう" },
      { file: "hp-music/amamiwoomouuta_sasori.aac", title: "奄美を想うsasori" },
      { file: "hp-music/shima_blues.aac", title: "島のブルース" },
      { file: "hp-music/furusatohekaeritai_sasori.aac", title: "ふるさとへ帰りたいsasori" },
      { file: "hp-music/yoronbojo.aac", title: "与論慕情" },
      { file: "hp-music/kakeromabojo.aac", title: "加計呂麻慕情" },
      { file: "hp-music/furusatoamamiyo-towani_sasori.aac", title: "ふるさと奄美よ永遠にsasori" },
      { file: "hp-music/shima_sodachi.aac", title: "島育ち" },
      { file: "hp-music/tokunoshima_kouta.aac", title: "徳之島小唄" },
      { file: "hp-music/funaki_koukou_sannensei.aac", title: "高校三年生" },
      { file: "hp-music/furusatoyo-hanareteitemo.mp3", title: "ふるさとよ離れていても" },
      { file: "hp-music/sinkawa_furusato.aac", title: "ふるさとへ" },
      { file: "hp-music/wagamichi.mp3", title: "我が道" },
      { file: "hp-music/shima_blues_misawa.aac", title: "島ブルース" }
    ];
    let currentTrack = 0;
    let isPlaying = false;
    let pausedTime = 0;

    // 時間のフォーマット関数
    function formatTime(seconds) {
      const minutes = Math.floor(seconds / 60);
      const remainingSeconds = Math.floor(seconds % 60).toString().padStart(2, '0');
      return `${minutes}:${remainingSeconds}`;
    }

    // （必要であれば）ダミーの関数として定義（またはこの呼び出しは削除）
    function updateProgressBar() {
      // ここではtimeupdateイベントで進捗を更新しているため不要
    }

    // トラック再生の関数
    function playTrack(trackIndex) { 
      audioPlayer.src = playlist[trackIndex].file;
      audioPlayer.currentTime = pausedTime;
      pausedTime = 0;
      audioPlayer.play().then(() => {
        isPlaying = true;
        playButton.textContent = "一時停止";
        trackTitle.textContent = "曲タイトル: " + playlist[trackIndex].title;
        notifyMainSlideshow(true);
      }).catch(error => {
        console.error("再生エラー:", error);
      });
      updateProgressBar(); // 必要に応じて呼び出し（エラーの原因なら削除）
    }

    // 各種イベントリスナーの設定
    playButton.addEventListener("click", () => {
      if (isPlaying) {
        audioPlayer.pause();
        isPlaying = false;
        pausedTime = audioPlayer.currentTime;
        playButton.textContent = "再生";
        notifyMainSlideshow(true);
      } else {
        playTrack(currentTrack);
      }
    });

    stopButton.addEventListener("click", () => {
      audioPlayer.pause();
      audioPlayer.currentTime = 0;
      pausedTime = 0;
      isPlaying = false;
      playButton.textContent = "再生";
      progressBar.value = 0;
      currentTimeDisplay.textContent = "0:00";
      notifyMainSlideshow(false);
    });

    nextTrackButton.addEventListener("click", () => {
      currentTrack = (currentTrack + 1) % playlist.length;
      playTrack(currentTrack);
    });

    audioPlayer.addEventListener("ended", () => {
      pausedTime = 0;
      currentTrack = (currentTrack + 1) % playlist.length;
      playTrack(currentTrack);
    });

    audioPlayer.addEventListener("timeupdate", () => {
      progressBar.value = audioPlayer.currentTime;
      currentTimeDisplay.textContent = formatTime(audioPlayer.currentTime);
    });

    audioPlayer.addEventListener("loadedmetadata", () => {
      progressBar.max = audioPlayer.duration;
      totalTimeDisplay.textContent = formatTime(audioPlayer.duration);
    });

    progressBar.addEventListener("input", () => {
      audioPlayer.currentTime = progressBar.value;
    });

    bgmCloseButton.addEventListener("click", () => {
      notifyMainSlideshow(false);
      window.close();
    });

    // 音量調整スライダーの設定
    volumeSlider.addEventListener("input", function() {
      audioPlayer.volume = this.value;  // 0.0 ～ 1.0 の範囲
    });

    // ※ 最初の自動再生は必要に応じてコメント解除
    // playTrack(currentTrack);
  </script>
</body>
</html>
